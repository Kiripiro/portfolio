name: Update Repos JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths:
      - scripts/generate-repos.mjs
      - .github/workflows/update-repos-json.yml

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate repos json
        env:
          DATA_USERNAME: ${{ secrets.DATA_USERNAME }}
          DATA_TOKEN: ${{ secrets.DATA_TOKEN }}
          GITHUB_REPOS_LIMIT: "30"
          GITHUB_EXCLUDED_REPOS: "Kiripiro"
        run: node scripts/generate-repos.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/repos.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): refresh repos json"
          git push
